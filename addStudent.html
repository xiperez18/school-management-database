<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 24px; }
        .wrap { max-width: 680px; margin: 0 auto; background: #fff; padding: 28px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        label { display: block; font-weight: bold; margin: 10px 0 6px; }
        input, select, textarea { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 18px; padding: 10px 18px; background: #27ae60; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #229954; }
    </style>
</head>
<body>
    <div class="wrap">
        <p><a href="Teacher.html">← Teacher home</a></p>
        <h1>Add Student</h1>
        <form method="post" action="add_student.php">
            <label for="first_name">First name</label>
            <input type="text" id="first_name" name="first_name" required>

            <label for="last_name">Last name</label>
            <input type="text" id="last_name" name="last_name" required>

            <label for="gender">Gender</label>
            <select id="gender" name="gender">
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>

            <label for="grade">Grade</label>
            <input type="text" id="grade" name="grade">

            <label for="address">Address</label>
            <input type="text" id="address" name="address">

            <label for="emergency_contact_name">Emergency contact name</label>
            <input type="text" id="emergency_contact_name" name="emergency_contact_name">

            <label for="emergency_contact_phone">Emergency contact phone</label>
            <input type="text" id="emergency_contact_phone" name="emergency_contact_phone">

            <label for="emergency_contact_relationship">Emergency contact relationship</label>
            <input type="text" id="emergency_contact_relationship" name="emergency_contact_relationship">

            <label for="email">Email</label>
            <input type="email" id="email" name="email">

            <label for="phone">Phone</label>
            <input type="text" id="phone" name="phone">

            <label for="medical_notes">Medical notes</label>
            <textarea id="medical_notes" name="medical_notes" rows="3"></textarea>

            <button type="submit">Add student</button>
        </form>
    </div>
</body>
</html>
