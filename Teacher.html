<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 24px; }
        .wrap { max-width: 700px; margin: 0 auto; background: #fff; padding: 28px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        h1 { margin-top: 0; color: #2c3e50; }
        p { color: #555; }
        .grid { display: grid; grid-template-columns: repeat(2, minmax(220px, 1fr)); gap: 14px; margin-top: 20px; }
        .card {
            display: block;
            text-decoration: none;
            color: #fff;
            background: #3498db;
            padding: 18px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }
        .card:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Teacher Portal</h1>
        <p>Select one of the student actions below.</p>

        <div class="grid">
            <a class="card" href="addStudent.html">Add Student</a>
            <a class="card" href="searchStudent.html">Search Students</a>
            <a class="card" href="editStudent.html">Edit Student</a>
            <a class="card" href="deleteStudent.html">Delete Student</a>
        </div>
    </div>
</body>
</html>
