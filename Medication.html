<!DOCTYPE html>
<html>
<body>
    
    <h1>Student Medication Form</h1>
    <form action="confirmation.html" method="get">
    
    <label for="diagnosis">Diagnosis:</label><br>
    <input type ="text" id="diagnosis" name="diagnosis"><br><br>
    
    <label for="medicationName">Medication Name:</label><br>
    <input type ="text" id="medicationName" name="medicationName"><br><br>
    
    <label for"medicine">Medication Type: </label>
    <select name"medicine" id="medicine">
        <option value="Pill">Pill</option>
        <option value="Inhaler">Inhaler</option>
        <option value="Injection">Injection</option>
        <option value="liquid">Liquid</option>
    </select><br><br>
    
    <label for="dosage">Dosage:</label><br>
    <input type ="text" id="dosage" name="dosage"><br><br>
    
    <button type="submit">Submit</button>

    
</html>
