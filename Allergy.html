<html>
<body>
    
    <h1>Student Allergy Form</h1>
    <form action="confirmation.html" method="get">
    
    <h4>Allergy Information</h4>
    
    <label for="allergy">What is student allergic to? </label><br> 
    <input type ="text" id="allergic" name="allergic"><br><br>
    
    <label for="symptoms">What symptoms does student experience?</label><br>
    <input type ="text" id="symptoms" name="symptoms"><br><br>
    
    <label for"allergyLevel">What is the severity level of the allergy?</label>
    <select name"allergyLevel" id="allergyLevel">
        <option value="Mild">Mild</option>
        <option value="Moderate">Moderate</option>
        <option value ="Severe">Severe</option>
    </select><br><br>
    
    <label for"medicine">Does student require medication?</label>
    <select name"medicine" id="medicine">
        <option value="Yes">Yes</option>
        <option value="No">No</option>
    </select><br><br>
    
    
    <button type="submit">Submit</button>

    
</html>
